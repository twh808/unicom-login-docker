# 工作流名称，随便填
name: Build Unicom Login ARM64 Docker Image
# 触发条件：推送到main分支时自动构建 + 支持手动触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 构建任务
jobs:
  build-and-push:
    # 运行环境：GitHub官方的Ubuntu服务器
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取GitHub仓库的所有代码到服务器
      - name: Checkout Code
        uses: actions/checkout@v4

      # 步骤2：配置Docker多架构构建工具（关键，支持ARM64）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤3：登录Docker Hub（使用后续配置的密钥）
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 步骤4：构建ARM64镜像并推送到Docker Hub
      - name: Build and Push ARM64 Image
        uses: docker/build-push-action@v5
        with:
          # 构建上下文：仓库根目录
          context: .
          # Dockerfile路径：仓库根目录的Dockerfile
          file: ./Dockerfile
          # 仅构建ARM64/v8架构（核心，适配ARM设备）
          platforms: linux/arm64/v8
          # 开启推送：推送到Docker Hub
          push: true
          # 镜像标签：DockerHub用户名/仓库名:最新版（后续改自己的DockerHub用户名）
          tags: twh808/unicom-login:latest
